name: Hourly World Cup Recap

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      models: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      PYTHONPATH: src
      ENABLE_GITHUB_MODELS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Execute recap pipeline
        run: python -m worldcup_recap run

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: worldcup-recap-artifacts
          path: |
            data/worldcup.sqlite
            logs/runs.ndjson
            site/index.html
            site/matches.csv
            site/team_status.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

